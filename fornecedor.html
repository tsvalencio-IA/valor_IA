<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Formulário de cotação — valor_IA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<style>
:root{--bg:#f4f7fb;--panel:#fff;--text:#182235;--muted:#68758a;--line:#d9e2ef;--blue:#2563eb;--green:#16a34a;--red:#dc2626;--radius:18px}
*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,Helvetica,sans-serif;color:var(--text)}main{max-width:920px;margin:auto;padding:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:0 10px 30px rgba(15,23,42,.08)}
h1{font-size:24px;margin:8px 0}h2{font-size:18px;margin:0 0 10px}.muted{color:var(--muted)}label{display:block;margin:8px 0 4px;font-weight:700;color:#46556b;font-size:13px}
input,textarea,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;font-size:14px}textarea{min-height:60px}
button{border:0;border-radius:12px;padding:11px 14px;background:var(--blue);color:white;font-weight:800;cursor:pointer}button.green{background:var(--green)}button.red{background:var(--red)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px}.item{border:1px solid var(--line);border-radius:16px;padding:12px;margin:12px 0;background:#fff}
.ok{color:var(--green);font-weight:800}.bad{color:var(--red);font-weight:800}.pill{display:inline-block;border:1px solid var(--line);background:#f8fafc;border-radius:999px;padding:5px 8px;margin:2px;font-size:12px}.footer{text-align:center;color:#64748b;padding:20px}
</style>
</head>
<body>
<main>
  <h1>Formulário de cotação</h1>
  <p class="muted">Preencha preço, marca, código da marca, descrição e disponibilidade. Pode salvar parcial.</p>
  <div id="app">Carregando...</div>
</main>
<div class="footer">Powered by thIAguinho Soluções Digitais</div>
<script>
const ASSINATURA="Powered by thIAguinho Soluções Digitais";
let db,qid,sid,token,quote={},supplier={};
function $(id){return document.getElementById(id)}
function qs(k){return new URLSearchParams(location.search).get(k)||""}
function esc(v){return String(v??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
function money(v){return Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})}
function parseMoney(v){let s=String(v||"").replace(/[^\d,.-]/g,"").trim();if(!s)return 0;if(s.includes(",")&&s.includes("."))s=s.replace(/\./g,"").replace(",",".");else if(s.includes(","))s=s.replace(",",".");let n=Number(s);return Number.isFinite(n)?n:0}
function init(){
  firebase.initializeApp(window.firebaseConfig); db=firebase.database();
  qid=qs("q"); sid=qs("s"); token=qs("t");
  if(!qid||!sid)return $("app").innerHTML="<div class='card'><b>Link inválido.</b></div>";
  db.ref("quotes/"+qid).on("value",snap=>{quote=snap.val()||{}; loadSupplier();});
}
function loadSupplier(){db.ref("suppliers/"+sid).once("value").then(s=>{supplier=s.val()||{}; render();});}
function render(){
  if(!quote.id)return $("app").innerHTML="<div class='card'>Cotação não encontrada.</div>";
  const link=quote.links?.[sid];
  if(link?.token && token && link.token!==token)return $("app").innerHTML="<div class='card'><b>Link não autorizado.</b></div>";
  if(quote.status==="closed")return $("app").innerHTML=`<div class='card'><h2>Cotação encerrada</h2><p>Esta cotação não está mais disponível para resposta.</p><p class='muted'>${ASSINATURA}</p></div>`;
  const items=(quote.items||[]).filter(i=>quote.kind==="priceCheck"?i.targetSupplierId===sid:true);
  const resp=quote.responses?.[sid]||{};
  $("app").innerHTML=`<div class='card'><h2>${esc(supplier.name||"Fornecedor")}</h2><p><b>Cotação:</b> ${esc(quote.number||qid)}<br><b>Itens:</b> ${items.length}</p></div>
  ${items.map((it,idx)=>{const r=resp[it.id]||{};return `<div class='item'><h2>${idx+1}. ${esc(it.desc)}</h2><p><span class='pill'>OEM: ${esc(it.oem||"-")}</span><span class='pill'>Qtd: ${esc(it.qty||1)}</span>${it.lastKnownPrice?`<span class='pill'>Valor conhecido: ${money(it.lastKnownPrice)}</span>`:""}</p>
    <div class='grid'>
      <div><label>Tenho / consigo fornecer?</label><select id='av_${it.id}'><option value='true' ${(r.available!==false)?"selected":""}>Sim</option><option value='false' ${r.available===false?"selected":""}>Não</option></select></div>
      <div><label>Marca</label><input id='brand_${it.id}' value='${esc(r.brand||it.brand||"")}'></div>
      <div><label>Código da marca</label><input id='bc_${it.id}' value='${esc(r.brandCode||it.brandCode||"")}'></div>
      <div><label>Preço unitário atual</label><input id='price_${it.id}' value='${esc(r.price||it.lastKnownPrice||"")}' placeholder='100,00'></div>
      <div><label>Disponibilidade / prazo</label><input id='disp_${it.id}' value='${esc(r.availability||it.availability||"")}' placeholder='hoje / amanhã / 2 dias'></div>
    </div>
    <label>Descrição do vendedor</label><input id='desc_${it.id}' value='${esc(r.desc||it.desc||"")}'>
    <label>Observação</label><textarea id='obs_${it.id}'>${esc(r.obs||"")}</textarea>
    <button class='green' onclick="saveItem('${it.id}')">Salvar este item</button>
    <span id='status_${it.id}' class='muted'></span>
  </div>`}).join("")}
  <div class='card'><button class='green' onclick='saveAll()'>Salvar tudo preenchido</button><p class='muted'>Você pode voltar depois pelo mesmo link enquanto a cotação estiver aberta.</p></div>`;
}
function payload(id){
  return {available:$("av_"+id).value==="true",brand:$("brand_"+id).value.trim(),brandCode:$("bc_"+id).value.trim(),desc:$("desc_"+id).value.trim(),price:parseMoney($("price_"+id).value),availability:$("disp_"+id).value.trim(),obs:$("obs_"+id).value.trim(),updatedAt:Date.now(),signature:ASSINATURA};
}
function saveItem(id){
  const p=payload(id);
  db.ref(`quotes/${qid}/responses/${sid}/${id}`).set(p).then(()=>{
    $("status_"+id).textContent=" salvo";
    const item=(quote.items||[]).find(x=>x.id===id);
    if(item && p.available && p.price>0){
      const priceId=item.sourcePriceId || (`auto_${sid}_${(item.oem||id).replace(/[^a-z0-9]/gi,"_")}`);
      db.ref("priceDb/"+priceId).update({supplierId:sid,oem:item.oem||"",desc:p.desc||item.desc,brand:p.brand,brandCode:p.brandCode,price:p.price,availability:p.availability,obs:p.obs,updatedAt:Date.now(),signature:ASSINATURA});
    }
  });
}
function saveAll(){
  const items=(quote.items||[]).filter(i=>quote.kind==="priceCheck"?i.targetSupplierId===sid:true);
  Promise.all(items.map(i=>saveItem(i.id))).then(()=>alert("Cotação salva. Obrigado!"));
}
window.addEventListener("load",init);
</script>
</body>
</html>
